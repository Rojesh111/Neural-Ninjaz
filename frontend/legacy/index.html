<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Zero-Trust | Document Upload</title>
    <link rel="stylesheet" href="index.css">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600&display=swap" rel="stylesheet">
</head>

<body>
    <div class="glass-container">
        <header>
            <h1>Zero-Trust <span class="highlight">Uploader</span></h1>
            <p>Secure Document Indexing System</p>
        </header>

        <main>
            <div class="selector-box">
                <button id="btn-personal" class="btn-toggle active">Personal</button>
                <button id="btn-legal" class="btn-toggle">Legal</button>
            </div>

            <div class="input-group">
                <input type="text" id="name-input" placeholder="Enter Document Name..." class="glass-input">
            </div>

            <div class="upload-card" id="drop-zone">
                <div class="icon-box">
                    <svg width="64" height="64" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"
                        stroke-linecap="round" stroke-linejoin="round">
                        <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path>
                        <polyline points="17 8 12 3 7 8"></polyline>
                        <line x1="12" y1="3" x2="12" y2="15"></line>
                    </svg>
                </div>
                <h3 id="upload-title">Drag & Drop Image</h3>
                <p id="upload-desc">Support for JPG, PNG</p>
                <input type="file" id="file-input" hidden accept="image/*" multiple>
                <button class="btn-primary" onclick="document.getElementById('file-input').click()">Browse
                    Files</button>
            </div>

            <div id="preview-container" class="preview-container hidden">
                <div id="file-list" class="file-list">
                    <!-- Multiple files will be listed here for Legal -->
                </div>
                <div class="file-info">
                    <span id="filename"></span>
                    <button id="upload-btn" class="btn-success">Upload and Index</button>
                </div>
            </div>

            <div id="status-container" class="status-container hidden">
                <div class="loader-box">
                    <div class="spinner"></div>
                    <p id="status-text">Uploading to Zero-Trust Firewall...</p>
                </div>
            </div>

            <div id="result-container" class="result-container hidden">
                <div class="success-box">
                    <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                        stroke-linecap="round" stroke-linejoin="round">
                        <polyline points="20 6 9 17 4 12"></polyline>
                    </svg>
                    <p>Indexed successfully!</p>
                </div>
                <div class="details">
                    <p><strong>Doc ID:</strong> <span id="res-doc-id">...</span></p>
                    <p><strong>Status:</strong> <span class="badge">SECURE</span></p>
                </div>
                <button class="btn-outline" onclick="location.reload()">Upload New</button>
            </div>
        </main>

        <footer>
            <p>User Session: <span id="user-id">123</span> (Demo Mode)</p>
            <div class="links">
                <a href="http://127.0.0.1:8000/admin" target="_blank">Admin Panel</a>
                <a href="http://127.0.0.1:8000/docs" target="_blank">API Docs</a>
            </div>
        </footer>
    </div>
    <script src="app.js"></script>
</body>

</html>
